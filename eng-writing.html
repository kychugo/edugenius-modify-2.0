<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hong Kong DSE English Writing Practice Platform</title>
    <!-- Tailwind CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <!-- docx.js CDN for DOCX export -->
    <script src="https://unpkg.com/docx@7.2.0/build/index.js"></script>
    <!-- FileSaver.js CDN for saving files -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <!-- Custom CSS -->
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #e0e7ff, #f3f4f6);
            color: #1f2937;
            margin: 0;
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1.5rem;
            min-height: calc(100vh - 80px);
        }
        .card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            margin-bottom: 1.5rem;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
        }
        .btn {
            background: #4f46e5;
            color: #ffffff;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            transition: background 0.3s, transform 0.2s;
        }
        .btn:hover {
            background: #4338ca;
            transform: scale(1.05);
        }
        .btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }
        .form-label {
            font-weight: 600;
            color: #374151;
        }
        .form-input, .form-select, .form-textarea {
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 0.75rem;
            width: 100%;
            transition: border-color 0.3s;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            border-color: #4f46e5;
            outline: none;
        }
        .output-box {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 1rem;
            white-space: pre-wrap;
        }
        .footer {
            text-align: center;
            padding: 1rem;
            background: #1f2937;
            color: #d1d5db;
            font-size: 0.875rem;
            position: relative;
            bottom: 0;
            width: 100%;
        }
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            .card {
                padding: 1.5rem;
            }
            .btn {
                width: 100%;
                text-align: center;
            }
            .form-input, .form-select, .form-textarea {
                font-size: 0.875rem;
            }
        }
        @media (max-width: 640px) {
            .card {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-gray-900">Hong Kong DSE English Writing Practice</h1>
            <p class="text-gray-600 mt-3 text-lg">Create custom DSE writing tasks and generate sample essays with formatted responses.</p>
        </header>

        <!-- Task Generation Section -->
        <div class="card">
            <h2 class="text-2xl font-semibold mb-6 text-gray-800">Generate Custom Writing Task</h2>
            <form id="taskForm" class="space-y-6">
                <div>
                    <label for="genre" class="form-label block mb-2">Genre</label>
                    <select id="genre" class="form-select" onchange="toggleCustomGenre()">
                        <option value="argumentative essay">Argumentative Essay</option>
                        <option value="narrative">Narrative</option>
                        <option value="descriptive essay">Descriptive Essay</option>
                        <option value="letter">Letter</option>
                        <option value="article">Article</option>
                        <option value="speech">Speech</option>
                        <option value="report">Report</option>
                        <option value="other">Other (Specify)</option>
                    </select>
                    <input type="text" id="customGenre" class="form-input mt-2 hidden" placeholder="Enter custom genre">
                </div>
                <div>
                    <label for="context" class="form-label block mb-2">Context (e.g., school magazine, public event)</label>
                    <textarea id="context" class="form-textarea" rows="4" placeholder="e.g., You are writing for a school magazine read by students and teachers in Hong Kong..."></textarea>
                </div>
                <div>
                    <label for="topic" class="form-label block mb-2">Topic or Theme</label>
                    <input type="text" id="topic" class="form-input" placeholder="e.g., Balancing technology and mental well-being">
                </div>
                <div>
                    <label for="wordLimit" class="form-label block mb-2">Word Limit</label>
                    <select id="wordLimit" class="form-select">
                        <option value="240-300">Part A: 240–300 words</option>
                        <option value="400-500">Part B: 400–500 words</option>
                    </select>
                </div>
                <button type="submit" id="generateTask" class="btn">Generate Task</button>
            </form>
            <div id="taskOutput" class="output-box"></div>
            <button id="exportTask" class="btn mt-4" disabled>Export Task to DOCX</button>
        </div>

        <!-- Sample Essay Section -->
        <div class="card">
            <h2 class="text-2xl font-semibold mb-6 text-gray-800">Generate Sample Essay</h2>
            <button id="generateEssay" class="btn" disabled>Generate Sample Essay</button>
            <div id="essayOutput" class="output-box"></div>
            <button id="exportEssay" class="btn mt-4" disabled>Export Task & Essay to DOCX</button>
        </div>
    </div>

    <footer class="footer">
        <p>Copyright © 2025 Hugo Wong. All rights reserved.</p>
    </footer>

    <script>
        const POLLINATIONS_API_KEY = 'sk_dk6t4GEymji9dVR9jPau4bB9RJYJ0JbP';
        const POLLINATIONS_API_URL = 'https://gen.pollinations.ai/v1/chat/completions';
        const FALLBACK_MODELS = ['gemini-search', 'gemini-fast', 'glm', 'openai-fast', 'openai', 'deepseek'];
        const { Document, Paragraph, TextRun, Packer } = docx;

        // Toggle Custom Genre Input
        function toggleCustomGenre() {
            const genreSelect = document.getElementById('genre');
            const customGenreInput = document.getElementById('customGenre');
            customGenreInput.classList.toggle('hidden', genreSelect.value !== 'other');
        }

        async function callGrokAPI(prompt) {
            const messages = [{ role: 'user', content: prompt }];
            for (const model of FALLBACK_MODELS) {
                try {
                    const response = await fetch(POLLINATIONS_API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${POLLINATIONS_API_KEY}`
                        },
                        body: JSON.stringify({ model: model, messages: messages })
                    });
                    if (!response.ok) {
                        console.warn(`Model ${model} failed with status ${response.status}, trying next model...`);
                        continue;
                    }
                    const data = await response.json();
                    const content = data.choices?.[0]?.message?.content;
                    if (content) return content;
                    console.warn(`Model ${model} returned no content, trying next model...`);
                } catch (error) {
                    console.warn(`Model ${model} failed with error: ${error.message}, trying next model...`);
                }
            }
            return 'An error occurred while generating content.';
        }

        // Format AI Response for Task
        function formatTaskResponse(response) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(response, 'text/html');
            const container = document.createElement('div');
            container.className = 'prose max-w-none';
            container.innerHTML = response;
            container.querySelectorAll('p').forEach(p => {
                p.className = 'mb-2 text-gray-700';
            });
            container.querySelectorAll('strong').forEach(strong => {
                strong.className = 'font-semibold text-gray-800';
            });
            container.querySelectorAll('ol').forEach(ol => {
                ol.className = 'list-decimal pl-6 mb-4 text-gray-700';
            });
            return container.outerHTML;
        }

        // Format AI Response for Essay
        function formatEssayResponse(response, genre) {
            const genreStructures = {
                'letter': ['I am writing to express my view on', 'I am writing in response to'],
                'speech': ['Good morning, ladies and gentlemen', 'It is an honor to address you today'],
                'argumentative essay': ['It is often argued that', 'This essay will discuss'],
                'article': ['In today’s fast-paced world', 'Recent developments in'],
                'report': ['This report aims to', 'The purpose of this report is to'],
                'narrative': ['It was a day I would never forget', 'As the sun set over'],
                'descriptive essay': ['The scene was one of breathtaking beauty', 'Imagine a place where']
            };
            const usefulPhrases = [
                { phrase: 'for the sake of', translation: '為了' },
                { phrase: 'in light of', translation: '鑑於' },
                { phrase: 'on the contrary', translation: '相反地' },
                { phrase: 'by and large', translation: '總體而言' },
                { phrase: 'in the long run', translation: '長遠來看' }
            ];
            let formattedResponse = response;
            // Apply bold to genre-specific structures
            (genreStructures[genre.toLowerCase()] || []).forEach(structure => {
                const regex = new RegExp(`(${structure})`, 'gi');
                formattedResponse = formattedResponse.replace(regex, '**$1**');
            });
            // Apply italics and Chinese translations to useful phrases
            usefulPhrases.forEach(({ phrase, translation }) => {
                const regex = new RegExp(`\\b${phrase}\\b`, 'gi');
                formattedResponse = formattedResponse.replace(regex, `_*${phrase}* (${translation})`);
            });
            const paragraphs = formattedResponse.split('\n\n').filter(p => p.trim());
            const container = document.createElement('div');
            container.className = 'prose max-w-none';
            paragraphs.forEach(para => {
                const p = document.createElement('p');
                p.className = 'mb-4 text-gray-700 leading-relaxed';
                p.innerHTML = para.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\*(.*?)\*/g, '<em>$1</em>');
                container.appendChild(p);
            });
            return container.outerHTML;
        }

        // Parse HTML to DOCX
        function parseHtmlToDocx(html, isEssay = false, genre = '') {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const paragraphs = [];
            if (!isEssay) {
                // Task formatting
                doc.body.childNodes.forEach(node => {
                    if (node.nodeName === 'P') {
                        const strong = node.querySelector('strong');
                        const text = node.textContent;
                        paragraphs.push(new Paragraph({
                            children: [
                                new TextRun({
                                    text: strong ? strong.textContent : text.split(':').shift(),
                                    bold: !!strong,
                                    size: 22
                                }),
                                new TextRun({
                                    text: strong ? `: ${text.replace(strong.textContent, '').trim()}` : text.replace(text.split(':').shift(), '').trim(),
                                    size: 22
                                })
                            ],
                            spacing: { after: 100 }
                        }));
                    } else if (node.nodeName === 'OL') {
                        node.querySelectorAll('li').forEach(li => {
                            paragraphs.push(new Paragraph({
                                children: [new TextRun({ text: `• ${li.textContent}`, size: 22 })],
                                spacing: { after: 100 }
                            }));
                        });
                    }
                });
            } else {
                // Essay formatting with bold and italics
                html.split('\n\n').forEach(para => {
                    const runs = [];
                    let currentText = para;
                    // Handle bold (**text**)
                    currentText = currentText.replace(/\*\*(.*?)\*\*/g, (match, text) => {
                        runs.push(new TextRun({ text, bold: true, size: 22 }));
                        return '';
                    });
                    // Handle italics with translations (*text* (translation))
                    currentText = currentText.replace(/\*(.*?)\* \((.*?)\)/g, (match, text, translation) => {
                        runs.push(new TextRun({ text, italics: true, size: 22 }));
                        runs.push(new TextRun({ text: ` (${translation})`, size: 22 }));
                        return '';
                    });
                    // Add remaining text
                    if (currentText.trim()) {
                        runs.push(new TextRun({ text: currentText, size: 22 }));
                    }
                    paragraphs.push(new Paragraph({
                        children: runs,
                        spacing: { after: 200 }
                    }));
                });
            }
            return paragraphs;
        }

        // Task Generation
        let currentTask = '';
        let formattedTask = '';
        let currentGenre = '';
        const taskForm = document.getElementById('taskForm');
        const taskOutput = document.getElementById('taskOutput');
        const generateEssayButton = document.getElementById('generateEssay');
        const exportTaskButton = document.getElementById('exportTask');
        const exportEssayButton = document.getElementById('exportEssay');
        taskForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const genreSelect = document.getElementById('genre');
            const customGenreInput = document.getElementById('customGenre');
            const genre = genreSelect.value === 'other' ? customGenreInput.value || 'custom genre' : genreSelect.value;
            currentGenre = genre;
            const context = document.getElementById('context').value || 'A general context relevant to Hong Kong students';
            const topic = document.getElementById('topic').value || 'A relevant topic for Hong Kong youth';
            const wordLimit = document.getElementById('wordLimit').value;
            const part = wordLimit.includes('240-300') ? 'Part A' : 'Part B';
            const prompt = `Generate a Hong Kong DSE English Writing task designed to elicit Level 7 performance in Content, Language, and Organization. The task should meet these criteria:
            - Content: Fully address the task, be entirely relevant, show creativity, develop ideas thoroughly with support, and show high audience awareness with appropriate register, tone, and style.
            - Language: Use a wide range of accurate sentence structures (including complex ones), precise vocabulary, and near-perfect grammar/spelling.
            - Organization: Feature logical development, sophisticated cohesive ties, and a coherent, genre-appropriate structure.
            Requirements:
            - Genre: ${genre}
            - Context: ${context}
            - Topic: ${topic}
            - Word Limit: ${wordLimit} words
            - Part: ${part}
            - Include 2–3 guiding points to help structure the response, ensuring opportunities for sophisticated organization and cohesion.
            - The task should be engaging, relevant to Hong Kong secondary students, and allow diverse perspectives or creative interpretations.
            Format the output as:
            <p><strong>Part:</strong> ${part}</p>
            <p><strong>Genre:</strong> ${genre}</p>
            <p><strong>Context:</strong> [context]</p>
            <p><strong>Question:</strong> [question]</p>
            <p><strong>Guiding Points:</strong></p>
            <ol class="list-decimal pl-5 mb-4">[guiding points]</ol>
            <p><strong>Word Limit:</strong> ${wordLimit} words</p>`;
            taskOutput.innerHTML = '<p class="text-gray-600">Generating task...</p>';
            currentTask = await callGrokAPI(prompt);
            formattedTask = formatTaskResponse(currentTask);
            taskOutput.innerHTML = formattedTask;
            generateEssayButton.disabled = false;
            exportTaskButton.disabled = false;
            exportEssayButton.disabled = true;
        });

        // Sample Essay Generation
        let currentEssay = '';
        generateEssayButton.addEventListener('click', async () => {
            if (!currentTask) {
                document.getElementById('essayOutput').innerHTML = '<p class="text-red-600">Please generate a task first.</p>';
                return;
            }
            const wordLimit = document.getElementById('wordLimit').value;
            const essayPrompt = `Generate a sample essay for the following Hong Kong DSE English Writing task:\n${currentTask}\nThe essay should aim for Level 7 in Content (fully relevant, creative, well-supported ideas, high audience awareness), Language (wide range of accurate complex structures, precise vocabulary, near-perfect grammar), and Organization (logical development, sophisticated cohesive ties, genre-appropriate structure). Word count: ${wordLimit} words.`;
            const essayOutput = document.getElementById('essayOutput');
            essayOutput.innerHTML = '<p class="text-gray-600">Generating essay...</p>';
            currentEssay = await callGrokAPI(essayPrompt);
            essayOutput.innerHTML = formatEssayResponse(currentEssay, currentGenre);
            exportEssayButton.disabled = false;
        });

        // Export Task to DOCX
        exportTaskButton.addEventListener('click', () => {
            if (!currentTask) return;
            const doc = new Document({
                sections: [{
                    properties: {},
                    children: [
                        new Paragraph({
                            children: [new TextRun({ text: "Hong Kong DSE English Writing Task", bold: true, size: 28 })],
                            spacing: { after: 200 }
                        }),
                        ...parseHtmlToDocx(currentTask),
                        new Paragraph({
                            children: [new TextRun({ text: "Copyright © 2025 Hugo Wong. All rights reserved.", size: 20, italics: true })],
                            spacing: { before: 400 }
                        })
                    ]
                }]
            });
            Packer.toBlob(doc).then(blob => {
                saveAs(blob, "DSE_Writing_Task.docx");
            });
        });

        // Export Task and Essay to DOCX
        exportEssayButton.addEventListener('click', () => {
            if (!currentTask || !currentEssay) return;
            const doc = new Document({
                sections: [{
                    properties: {},
                    children: [
                        new Paragraph({
                            children: [new TextRun({ text: "Hong Kong DSE English Writing Task and Sample Essay", bold: true, size: 28 })],
                            spacing: { after: 200 }
                        }),
                        new Paragraph({
                            children: [new TextRun({ text: "Task", bold: true, size: 24 })],
                            spacing: { after: 100 }
                        }),
                        ...parseHtmlToDocx(currentTask),
                        new Paragraph({
                            children: [new TextRun({ text: "Sample Essay", bold: true, size: 24 })],
                            spacing: { before: 400, after: 100 }
                        }),
                        ...parseHtmlToDocx(currentEssay, true, currentGenre),
                        new Paragraph({
                            children: [new TextRun({ text: "Copyright © 2025 Hugo Wong. All rights reserved.", size: 20, italics: true })],
                            spacing: { before: 400 }
                        })
                    ]
                }]
            });
            Packer.toBlob(doc).then(blob => {
                saveAs(blob, "DSE_Writing_Task_and_Essay.docx");
            });
        });
    </script>
</body>
</html>
